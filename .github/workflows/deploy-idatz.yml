name: Deploy Demo to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test:coverage --workspace=packages/idaztian

      - name: Build docs
        run: npm run docs --workspace=packages/idaztian

      - name: Prepare Pages artifacts
        run: |
          mkdir -p .gh-pages-dist

          # Redirect to idatzi GH Pages (idatzi moved to its own repo)
          cat > .gh-pages-dist/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=https://xezpeleta.github.io/idatzi/">
            <title>Idaztian — redirecting to Idatzi demo</title>
          </head>
          <body>
            <p><a href="https://xezpeleta.github.io/idatzi/">Go to Idatzi demo →</a></p>
          </body>
          </html>
          HTML

          # API docs
          mkdir -p .gh-pages-dist/docs
          cp -r packages/idaztian/docs-dist/* .gh-pages-dist/docs/

          # Package dist for CDN use
          mkdir -p .gh-pages-dist/packages/idaztian/dist
          cp -r packages/idaztian/dist/* .gh-pages-dist/packages/idaztian/dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './.gh-pages-dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
